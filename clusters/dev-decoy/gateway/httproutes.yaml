---
# agent-factory intake-api alert webhooks. Scoped to /webhooks (the three
# alert endpoints) + /healthz only — /qa/runs and /runs are intentionally NOT
# exposed (they queue/inspect runs and are unauthenticated when
# INTAKE_API_TOKEN is unset). Datadog/Grafana/PagerDuty POST here; the listener
# snapshots the impacted service's traffic from the 10 min before the alert.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agent-factory-webhooks
  namespace: agent-factory
spec:
  parentRefs:
  - name: apex-gateway
    namespace: istio-system
  hostnames:
  - apex-agent-factory-dev.trafficreplay.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /webhooks
    - path:
        type: PathPrefix
        value: /healthz
    backendRefs:
    - name: agent-factory-dev-decoy-intake-api
      port: 8080
---
# Replay Lab public console + read-only control status endpoints.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: replay-lab
  namespace: replay-lab
spec:
  parentRefs:
  - name: apex-gateway
    namespace: istio-system
  hostnames:
  - replay-lab-dev.trafficreplay.com
  rules:
  - matches:
    - path:
        type: Exact
        value: /status
    - path:
        type: Exact
        value: /readyz
    backendRefs:
    - name: replay-lab-control
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: replay-lab-console
      port: 80
