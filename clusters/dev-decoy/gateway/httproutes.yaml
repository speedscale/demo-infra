apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: banking-frontend
  namespace: banking-app
spec:
  parentRefs:
  - name: apex-gateway
    namespace: istio-system
  hostnames:
  - apex-banking-dev.trafficreplay.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: banking-frontend
      port: 80
---
