apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-factory-dev-decoy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/speedscale/agent-factory
    targetRevision: main
    path: charts/agent-factory
    helm:
      values: |
        sizing: small
        # No PVC: pods use emptyDir. Avoids the RWO block-storage volume that
        # can't be shared across intake-api/worker or survive a rolling update.
        persistence:
          enabled: false
        image:
          tag: v0.1.83
        engine:
          kind: claude-sdk
          model: claude-opus-4-7
          authSecret:
            name: anthropic-api-key
            key: token
        archive:
          backend: local
          path: /var/lib/agent-factory/archive
        intakeApi:
          replicas: 1
          otlp:
            enabled: true
            archive:
              bucket: do-nyc1-dev-decoy-agent-factory
              endpoint: https://nyc3.digitaloceanspaces.com
              region: us-east-1
              secretName: agent-factory-archive-s3   # keys: access-key-id, secret-access-key
        worker:
          replicas: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-factory
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
