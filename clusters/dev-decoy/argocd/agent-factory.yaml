apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-factory-dev-decoy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/speedscale/agent-factory
    targetRevision: main
    path: charts/agent-factory
    helm:
      values: |
        sizing: small
        image:
          tag: v0.1.83
        engine:
          kind: claude-sdk
          model: claude-opus-4-7
          authSecret:
            name: anthropic-api-key
            key: token
        archive:
          backend: local
          path: /var/lib/agent-factory/archive
        intakeApi:
          replicas: 1
          otlp:
            enabled: true
        worker:
          replicas: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-factory
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
