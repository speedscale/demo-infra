apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: byoc-fluentbit-gcs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/speedscale/speedscale-byoc
    targetRevision: HEAD
    path: charts/fluentbit-gcs
    helm:
      values: |
        gcs:
          bucket: speedscale-rrpair-demo
          region: us-central1
          credentialsSecret: byoc-fluentbit-gcs
  destination:
    server: https://kubernetes.default.svc
    namespace: byoc-fluentbit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
