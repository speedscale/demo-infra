apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: speedscale-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://speedscale.github.io/operator-helm/
    chart: speedscale-operator
    targetRevision: 2.5.701
    helm:
      values: |
        apiKeySecret: speedscale-apikey
        appUrl: dev.speedscale.com
        clusterName: dev-decoy
        dlp:
          config: banking-app-keys
          enabled: true
        ebpf:
          enabled: true
          configuration:
            telemetry:
              enabled: true
        forwarder:
          exporters:
            byoc_grafana:
              dlp_config_id: banking-app-keys
              filter_rule: standard
              otel_endpoint: http://otel-collector.observability.svc.cluster.local:4317
            byoc_s3:
              dlp_config_id: banking-app-keys
              filter_rule: standard
              otel_endpoint: http://otel-collector.byoc-s3.svc.cluster.local:4317
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 300m
              memory: 512M
        collector:
          resources:
            limits:
              cpu: 300m
              memory: 250M
            requests:
              cpu: 100m
              memory: 128M
        logLevel: debug
        operator:
          test_prep_timeout: 20m
        replayComponents:
          redis:
            podSecurityContext:
              fsGroup: 999
              runAsGroup: 999
              runAsNonRoot: true
              runAsUser: 999
            securityContext:
              readOnlyRootFilesystem: false
              runAsGroup: 999
              runAsNonRoot: true
              runAsUser: 999
          responder:
            resources:
              limits:
                cpu: 500m
                memory: 1G
              requests:
                cpu: 100m
                memory: 128M
  destination:
    server: https://kubernetes.default.svc
    namespace: speedscale
  syncPolicy:
    automated:
      # The operator chart ships its ConfigMap and cert Secrets as pre-install
      # hooks (PreSync under Argo). Automated prune deletes them after every
      # sync, and the next operator pod restart then fails to mount its certs.
      prune: false
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
