apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: speedscale-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://speedscale.github.io/operator-helm/
    chart: speedscale-operator
    targetRevision: "*"
    helm:
      values: |
        apiKeySecret: speedscale-apikey
        appUrl: dev.speedscale.com
        clusterName: dev-miniken
        dlp:
          config: decoy-email-2
          enabled: true
        ebpf:
          enabled: true
        forwarder:
          exporters:
            byoc_grafana:
              dlp_config_id: standard
              filter_rule: standard
              otel_endpoint: http://otel-collector.byoc-grafana.svc.cluster.local:4317
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
        logLevel: debug
  destination:
    server: https://kubernetes.default.svc
    namespace: speedscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
