apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: banking-frontend
  namespace: banking-app
spec:
  parentRefs:
  - name: demo-gateway
    namespace: istio-system
  hostnames:
  - banking.staging.miniken.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: banking-frontend
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: banking-app
