  hostnames:
  - grafana.staging.miniken.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: grafana
      port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jaeger
  namespace: banking-app
spec:
  parentRefs:
  - name: demo-gateway
    namespace: istio-system
  hostnames:
  - jaeger.staging.miniken.local
