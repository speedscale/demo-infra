apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: outerspace-go-staging-miniken
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/speedscale/outerspace-go
    targetRevision: main
    path: overlays/speedscale
  destination:
    server: https://kubernetes.default.svc
    namespace: outerspace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
