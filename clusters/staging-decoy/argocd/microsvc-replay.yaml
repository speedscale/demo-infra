apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microsvc-replay
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/speedscale/microsvc
    targetRevision: HEAD
    path: kubernetes/overlays/replay
    # Demo fixture: arm the Replay Lab null-memo bug on the banking-replay SUT so
    # the in-cluster replay reproduces it (microsvc flag demo.memo-bug.enabled,
    # default OFF). Remove to disarm.
    kustomize:
      patches:
        - patch: |-
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: banking-transactions
            spec:
              template:
                spec:
                  containers:
                    - name: transactions-service
                      env:
                        - name: DEMO_MEMO_BUG_ENABLED
                          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: banking-replay
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
