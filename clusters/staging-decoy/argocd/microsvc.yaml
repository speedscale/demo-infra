apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microsvc-staging-decoy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/speedscale/microsvc
    targetRevision: HEAD
    path: kubernetes/overlays/speedscale-sidecar
    # Demo fixture: arm the Replay Lab null-memo bug on banking-transactions
    # (microsvc TransactionService, flag demo.memo-bug.enabled, default OFF in the
    # app). This IaC patch flips it ON for the Replay Lab recording. Remove to disarm.
    kustomize:
      patches:
        - target:
            kind: Deployment
            name: banking-transactions
          patch: |-
            - op: add
              path: /spec/template/spec/containers/0/env/-
              value:
                name: DEMO_MEMO_BUG_ENABLED
                value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: banking-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
