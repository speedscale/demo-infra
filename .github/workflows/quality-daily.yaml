name: Daily Quality Replays

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily
  workflow_dispatch:
    inputs:
      cluster:
        description: 'Cluster to replay (or "all")'
        default: 'all'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  validate-scheduled-run:
    name: Validate scheduled run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.guard.outputs.should-run }}
    steps:
    - name: Check scheduled SHA
      id: guard
      env:
        GH_TOKEN: ${{ github.token }}
        EVENT_NAME: ${{ github.event_name }}
        REPOSITORY: ${{ github.repository }}
        RUN_SHA: ${{ github.sha }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      run: |
        if [ "$EVENT_NAME" != "schedule" ]; then
          echo "should-run=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        latest_sha="$(gh api "repos/$REPOSITORY/commits/$DEFAULT_BRANCH" --jq .sha)"
        if [ "$RUN_SHA" != "$latest_sha" ]; then
          echo "Scheduled run is stale: $RUN_SHA != $latest_sha"
          echo "should-run=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "should-run=true" >> "$GITHUB_OUTPUT"

  ci-replay:
    name: CI replay (proxymock)
    runs-on: ubuntu-latest
    needs: validate-scheduled-run
    if: needs.validate-scheduled-run.outputs.should-run == 'true'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        replay:
          - banking-accounts
          - banking-ai
          - banking-fraud
          - banking-gateway
          - banking-notification
          - banking-transactions
          - banking-user
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install doctl
      uses: digitalocean/action-doctl@v2
      with:
        token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

    - name: Install proxymock
      run: |
        curl -sL https://downloads.speedscale.com/proxymock/install-proxymock | sh
        echo "$HOME/.speedscale" >> $GITHUB_PATH

    - name: Configure speedctl for CI replay
      env:
        SPEEDCTL_DEV_CONFIG: ${{ secrets.SPEEDCTL_DEV_CONFIG }}
      run: |
        mkdir -p "$HOME/.speedscale"
        echo "$SPEEDCTL_DEV_CONFIG" > "$HOME/.speedscale/config.yaml"

    - name: Run proxymock scenario
      env:
        SPEEDCTL_HOME: ${{ runner.temp }}/speedctl
        SPEEDSCALE_HOME: ${{ runner.temp }}/speedctl
      run: |
        mkdir -p "$SPEEDCTL_HOME"
        cp "$HOME/.speedscale/config.yaml" "$SPEEDCTL_HOME/config.yaml"
        ./quality/scripts/run-proxymock-scenario.sh dev-decoy ${{ matrix.replay }}

    - name: Upload proxymock report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: proxymock-ci-${{ matrix.replay }}
        path: quality/proxymock-reports/dev-decoy/${{ matrix.replay }}.json
        if-no-files-found: ignore

  cd-replay-dev:
    name: CD replay (dev)
    runs-on: ubuntu-latest
    needs: ci-replay
    timeout-minutes: 90
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.cluster == 'all' || github.event.inputs.cluster == 'dev-decoy'
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install doctl
      uses: digitalocean/action-doctl@v2
      with:
        token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

    - name: Install speedctl
      run: |
        curl -sL https://downloads.speedscale.com/speedctl/install | bash
        echo "$HOME/.speedscale" >> $GITHUB_PATH

    - name: Configure speedctl
      env:
        SPEEDCTL_DEV_CONFIG: ${{ secrets.SPEEDCTL_DEV_CONFIG }}
      run: |
        mkdir -p "$HOME/.speedscale"
        echo "$SPEEDCTL_DEV_CONFIG" > "$HOME/.speedscale/config.yaml"

    - name: Run dev replays
      env:
        SPEEDCTL_HOME: ${{ runner.temp }}/speedctl
      run: |
        mkdir -p "$SPEEDCTL_HOME"
        cp "$HOME/.speedscale/config.yaml" "$SPEEDCTL_HOME/config.yaml"
        ./quality/scripts/run-replay.sh dev-decoy

  cd-replay-staging:
    name: CD replay (staging)
    runs-on: ubuntu-latest
    needs: ci-replay
    timeout-minutes: 90
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.cluster == 'all' || github.event.inputs.cluster == 'staging-decoy'
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install doctl
      uses: digitalocean/action-doctl@v2
      with:
        token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

    - name: Install speedctl
      run: |
        curl -sL https://downloads.speedscale.com/speedctl/install | bash
        echo "$HOME/.speedscale" >> $GITHUB_PATH

    - name: Configure speedctl
      env:
        SPEEDCTL_STAGING_CONFIG: ${{ secrets.SPEEDCTL_STAGING_CONFIG }}
      run: |
        mkdir -p "$HOME/.speedscale"
        echo "$SPEEDCTL_STAGING_CONFIG" > "$HOME/.speedscale/config.yaml"

    - name: Run staging replays
      env:
        SPEEDCTL_HOME: ${{ runner.temp }}/speedctl
      run: |
        mkdir -p "$SPEEDCTL_HOME"
        cp "$HOME/.speedscale/config.yaml" "$SPEEDCTL_HOME/config.yaml"
        ./quality/scripts/run-replay.sh staging-decoy
