name: Deploy ArgoCD Applications

on:
  push:
    branches: [main]
    paths:
    - 'clusters/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cluster: [dev-decoy, staging-decoy]
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install doctl
      uses: digitalocean/action-doctl@v2
      with:
        token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

    - name: Connect to cluster
      run: doctl kubernetes cluster kubeconfig save ${{ matrix.cluster }}

    - name: Apply root ArgoCD Application
      run: kubectl apply -f clusters/${{ matrix.cluster }}/argocd/demo-infra-apps.yaml

    - name: Patch Replay Lab forwarder export
      run: |
        if kubectl -n speedscale get configmap speedscale-forwarder >/dev/null 2>&1; then
          current="$(kubectl -n speedscale get configmap speedscale-forwarder -o jsonpath='{.data.EXPORTERS}')"
          merged="$(
            printf '%s' "$current" | jq -c \
              '. + {replay_lab: {dlp_config_id: "banking-app-keys", filter_rule: "standard", otel_endpoint: "http://replay-lab-control.replay-lab.svc.cluster.local:4317"}}'
          )"
          patch="$(jq -cn --arg exporters "$merged" '{data: {EXPORTERS: $exporters}}')"
          kubectl -n speedscale patch configmap speedscale-forwarder --type merge -p "$patch"
          kubectl -n speedscale rollout restart deployment/speedscale-forwarder
          kubectl -n speedscale rollout status deployment/speedscale-forwarder --timeout=180s
        else
          echo "Skipping Replay Lab forwarder export patch: speedscale-forwarder ConfigMap is not present yet"
        fi

    - name: Apply SealedSecrets
      run: |
        if [ -d "clusters/${{ matrix.cluster }}/sealed-secrets" ]; then
          for f in clusters/${{ matrix.cluster }}/sealed-secrets/*.yaml; do
            ns=$(grep 'namespace:' "$f" | head -1 | awk '{print $2}')
            if [ -n "$ns" ]; then
              kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
            fi
            echo "Applying $f"
            kubectl apply -f "$f"
          done
        fi

    - name: Apply Gateway API resources
      run: |
        if [ -d "clusters/${{ matrix.cluster }}/gateway" ]; then
          kubectl apply -f clusters/${{ matrix.cluster }}/gateway/
        fi

    - name: Apply Istio config
      run: |
        if [ -d "clusters/${{ matrix.cluster }}/istio-config" ]; then
          kubectl apply -f clusters/${{ matrix.cluster }}/istio-config/
        fi

    - name: Verify sync started
      run: |
        sleep 10
        kubectl get applications -n argocd \
          -o custom-columns=NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status

  trigger-quality:
    needs: deploy
    uses: ./.github/workflows/quality-post-deploy.yaml
    secrets: inherit
